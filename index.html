<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FBSM — Система учёта продаж</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f5f3;--surface:#fff;--s2:#f0eeea;
  --text:#1a1a1a;--muted:#6b6b68;--border:#e0ded8;
  --blue:#185FA5;--bl:#E6F1FB;--bd:#0C447C;
  --green:#3B6D11;--gl:#EAF3DE;
  --amber:#BA7517;--al:#FAEEDA;
  --red:#A32D2D;--rl:#FCEBEB;
  --r:10px;--rs:6px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px}
.screen{display:none;min-height:100vh}.screen.active{display:block}
.aw{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem}
.ac{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);padding:2rem;width:100%;max-width:360px}
.brand{font-size:28px;font-weight:700;letter-spacing:2px;color:var(--bd);text-align:center}
.sub{font-size:13px;color:var(--muted);text-align:center;margin:4px 0 1.5rem}
.layout{display:flex;min-height:100vh}
.sb{width:220px;background:var(--bd);color:#fff;flex-shrink:0;display:flex;flex-direction:column}
.sb-logo{padding:1.25rem 1rem;font-size:18px;font-weight:700;letter-spacing:1px;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-user{padding:.75rem 1rem;font-size:12px;color:rgba(255,255,255,.6);border-bottom:1px solid rgba(255,255,255,.1)}
.sb-user strong{display:block;color:#fff;font-size:13px;margin-bottom:2px}
.ni{display:flex;align-items:center;gap:10px;padding:.75rem 1rem;font-size:14px;color:rgba(255,255,255,.75);cursor:pointer;border:none;background:none;width:100%;text-align:left;border-left:3px solid transparent}
.ni:hover{background:rgba(255,255,255,.08);color:#fff}
.ni.active{background:rgba(255,255,255,.12);color:#fff;border-left-color:#fff}
.sb-bot{margin-top:auto;padding:1rem;border-top:1px solid rgba(255,255,255,.1)}
.main{flex:1;overflow-y:auto}
.mh{background:var(--surface);border-bottom:1px solid var(--border);padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between}
.mt{font-size:17px;font-weight:600}
.cnt{padding:1.5rem}
@media(max-width:640px){
  .layout{flex-direction:column}.sb{width:100%;flex-direction:row;flex-wrap:wrap}
  .sb-logo{flex:1}.sb-user{display:none}
  .ni{padding:.5rem .75rem;font-size:12px;border-left:none;border-bottom:3px solid transparent}
  .ni.active{border-bottom-color:#fff;border-left:none}
  .sb-bot{padding:.5rem}.cnt{padding:1rem}
}
.card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);padding:1.25rem;margin-bottom:1rem}
.ct{font-size:15px;font-weight:600;margin-bottom:1rem}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:.75rem}
@media(max-width:640px){.g2,.g3,.g4{grid-template-columns:1fr 1fr}}
.metric{background:var(--s2);border-radius:var(--rs);padding:1rem;text-align:center}
.mv{font-size:20px;font-weight:700;margin-top:4px;line-height:1}
.ml{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--rs);border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s}
.btn:hover{background:var(--s2)}.btn:disabled{opacity:.5;cursor:not-allowed}
.bp{background:var(--blue);color:#fff;border-color:var(--blue)}.bp:hover{background:var(--bd)}
.bd2{color:var(--red);border-color:var(--red)}.bd2:hover{background:var(--rl)}
.bsm{padding:5px 10px;font-size:12px}.bbl{width:100%;justify-content:center}
.fg{margin-bottom:.75rem}
.fl{font-size:13px;color:var(--muted);display:block;margin-bottom:4px;font-weight:500}
.fc{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:var(--rs);background:var(--surface);color:var(--text);font-size:14px}
.fc:focus{outline:none;border-color:var(--blue)}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
@media(max-width:400px){.fr{grid-template-columns:1fr}}
.pb{background:var(--s2);border-radius:100px;height:8px;overflow:hidden;margin:6px 0}
.pf{height:100%;border-radius:100px;transition:width .5s}
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:100px;font-size:11px;font-weight:600}
.ts{background:var(--gl);color:var(--green)}.tw{background:var(--al);color:var(--amber)}
.td{background:var(--rl);color:var(--red)}.ti{background:var(--bl);color:var(--bd)}
.tw-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--s2);padding:8px 10px;text-align:left;font-weight:600;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;white-space:nowrap}
td{padding:8px 10px;border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--s2)}
.alert{padding:10px 14px;border-radius:var(--rs);font-size:13px;margin-bottom:.75rem}
.as{background:var(--gl);color:var(--green)}.ae{background:var(--rl);color:var(--red)}.ai{background:var(--bl);color:var(--bd)}
.motiv{background:var(--bl);border:1px solid #B5D4F4;border-radius:var(--r);padding:1rem;margin-bottom:1rem;font-size:14px;color:var(--bd)}
.zpr{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px dashed var(--border);font-size:13px;color:var(--muted)}
.zpr:last-child{border:none;font-weight:600;color:var(--text);font-size:14px}
.rank{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:100px;font-size:12px;font-weight:600}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:center;justify-content:center;padding:1rem}
.ovc{background:var(--surface);border-radius:var(--r);padding:1.5rem;width:100%;max-width:600px;max-height:90vh;overflow-y:auto}
.spin{display:inline-block;width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:sp .6s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.loader{position:fixed;inset:0;background:rgba(255,255,255,.92);display:flex;align-items:center;justify-content:center;z-index:999;gap:10px;font-size:14px;color:var(--muted)}
.print-only{display:none}
@media print{.sb,.mh,.btn,.nav-item{display:none!important}.print-only{display:block}.cnt{padding:0}}
</style>
</head>
<body>

<div id="loader" class="loader"><div class="spin"></div> Загрузка...</div>

<div id="screen-login" class="screen">
  <div class="aw"><div class="ac">
    <div class="brand">FBSM</div>
    <div class="sub">Система учёта продаж</div>
    <div id="lerr" class="alert ae" style="display:none"></div>
    <div class="fg"><label class="fl">Выберите имя</label>
      <select id="lname" class="fc"><option value="">— выберите —</option></select>
    </div>
    <div class="fg"><label class="fl">Пароль</label>
      <input type="password" id="lpass" class="fc" placeholder="Введите пароль">
    </div>
    <button class="btn bp bbl" onclick="doLogin()">Войти</button>
  </div></div>
</div>

<div id="screen-app" class="screen">
  <div class="layout">
    <div class="sb">
      <div class="sb-logo">FBSM</div>
      <div class="sb-user"><strong id="sb-name">—</strong><span id="sb-shop">—</span></div>
      <div id="sb-nav"></div>
      <div class="sb-bot">
        <button class="btn bsm bbl" style="color:#fff;border-color:rgba(255,255,255,.3);background:transparent" onclick="doLogout()">Выйти</button>
      </div>
    </div>
    <div class="main">
      <div class="mh"><span class="mt" id="main-title">—</span><span id="main-badge"></span></div>
      <div class="cnt" id="content"></div>
    </div>
  </div>
</div>

<script>
const API='https://script.google.com/macros/s/AKfycbyj3GZzlo1LMHhxbw01kWMiS_rG5u4kwmDt7kXNv4J0T2KeU4UO98Xrsi0KpUvCtGRs/exec';
const SHOPS=['Караганда','Алматы','Асфендиярова','Манаса','Республика'];
let CU=null,PARAMS={},USERS=[],_sales=[],_plans=[];

// ══ API ══
async function api(action,data={}){
  const url=API+'?action='+action+'&'+new URLSearchParams(data).toString();
  const r=await fetch(url,{redirect:'follow'});
  const j=await r.json();
  if(j.error)throw new Error(j.error);
  return j;
}
async function apiPost(action,data={}){
  try{
    const r=await fetch(API,{method:'POST',redirect:'follow',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action,...data})});
    const j=await r.json();
    if(j.error)throw new Error(j.error);
    return j;
  }catch(e){return api(action,data)}
}

// ══ UTILS ══
const fmt=n=>Math.round(n||0).toLocaleString('ru-RU')+'₸';
const fmtN=n=>Math.round(n||0).toLocaleString('ru-RU');
function today(){return new Date().toISOString().slice(0,10)}
function curMk(){
  const n=new Date();
  return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0');
}
function daysInMk(mk){const[y,m]=mk.split('-');return new Date(+y,+m,0).getDate()}
function L(on){document.getElementById('loader').style.display=on?'flex':'none'}
function setTitle(t){document.getElementById('main-title').textContent=t}
function setBadge(h){document.getElementById('main-badge').innerHTML=h}
function setContent(h){document.getElementById('content').innerHTML=h}
function normDate(d){return String(d).slice(0,10)}
function normMk(v){const s=String(v);const m=s.match(/^(\d{4}-\d{2})/);return m?m[1]:s}

function barCol(p){if(p>=1.4)return'#639922';if(p>=1)return'#185FA5';if(p>=.8)return'#BA7517';return'#A32D2D'}
function getRank(p){
  if(p>=1.4)return{lbl:'Легенда', ic:'🏆',col:'#BA7517',bg:'#FAEEDA'}
  if(p>=1.0)return{lbl:'Мастер',  ic:'⭐',col:'#185FA5',bg:'#E6F1FB'}
  if(p>=0.8)return{lbl:'Самурай', ic:'⚔️',col:'#3B6D11',bg:'#EAF3DE'}
  if(p>=0.5)return{lbl:'Падаван', ic:'🌀',col:'#533F2E',bg:'#F1EFE8'}
  return           {lbl:'Искатель',ic:'🌱',col:'#888780',bg:'#F1EFE8'}
}
function rankChip(p){const r=getRank(p);return`<span class="rank" style="background:${r.bg};color:${r.col}">${r.ic} ${r.lbl}</span>`}
function motiv(p){
  if(p>=1.4)return'🏆 Легенда! Невероятный результат — ты вошёл в историю этого месяца!'
  if(p>=1.2)return'⭐ Мастер не останавливается! До звания Легенды — совсем чуть-чуть!'
  if(p>=1.0)return'✅ Самурай выполнил план! Каждая продажа теперь — +3% к зарплате!'
  if(p>=0.8)return'⚔️ Уровень Самурая! Следующая цель — 100% и звание Мастера!'
  if(p>=0.5)return'🌀 Падаван на пути! До уровня Самурая — рукой подать.'
  return'🌱 Путь Искателя начался! Введи продажи и наблюдай, как растёт зарплата!'
}

function calcZP(sales,checks,units,pct,p){
  p=p||PARAMS;
  const shifts=parseFloat(p.shifts)||15;
  const rate=parseFloat(p.rate)||6000;
  // Фактические смены = количество дней с продажами (передаётся отдельно)
  // В прогнозе используем норму смен
  const oklad=shifts*rate;
  const base=sales*(parseFloat(p.base)||0.01);
  const a80=pct>=0.8?sales*(parseFloat(p.p80)||0.005):0;
  const a100=pct>=1?sales*(parseFloat(p.p100)||0.015):0;
  const a140=pct>=1.4?sales*(parseFloat(p.p140)||0.03):0;
  const bMag=pct>=1?(parseFloat(p.bMag)||10000):0;
  const avg=checks>0?sales/checks:0;
  const upt=checks>0?units/checks:0;
  const bk1=avg>=(parseFloat(p.avgNorm)||15000)?(parseFloat(p.bKpi)||10000):0;
  const bk2=upt>=(parseFloat(p.uptNorm)||2.5)?(parseFloat(p.bKpi)||10000):0;
  return{oklad,base,a80,a100,a140,bMag,bk1,bk2,total:oklad+base+a80+a100+a140+bMag+bk1+bk2,avg,upt};
}

function calcZPActual(sales,checks,units,pct,actualShifts,shopPlanMet,p){
  if(typeof shopPlanMet==='object'&&shopPlanMet!==null&&!p){p=shopPlanMet;shopPlanMet=undefined;}
  p=p||PARAMS;
  const rate=parseFloat(p.rate)||6000;
  const oklad=actualShifts*rate;
  const base=sales*(parseFloat(p.base)||0.01);
  const a80=pct>=0.8?sales*(parseFloat(p.p80)||0.005):0;
  const a100=pct>=1?sales*(parseFloat(p.p100)||0.015):0;
  const a140=pct>=1.4?sales*(parseFloat(p.p140)||0.03):0;
  const bMag=(shopPlanMet!==undefined?shopPlanMet:(pct>=1))?(parseFloat(p.bMag)||10000):0;
  const avg=checks>0?sales/checks:0;
  const upt=checks>0?units/checks:0;
  const uptN=Math.min(parseFloat(p.uptNorm)||2.5,100);
  const bk1=avg>=(parseFloat(p.avgNorm)||15000)?(parseFloat(p.bKpi)||10000):0;
  const bk2=upt>=uptN?(parseFloat(p.bKpi)||10000):0;
  return{oklad,base,a80,a100,a140,bMag,bk1,bk2,total:oklad+base+a80+a100+a140+bMag+bk1+bk2,avg,upt};
}

function getPlan(uid,mk){
  const r=_plans.find(p=>String(p.uid)===String(uid)&&normMk(p.mk)===normMk(mk));
  return r?parseFloat(r.amount)||0:0;
}
function getEntriesFor(uid,mk){
  return _sales.filter(s=>String(s.uid)===String(uid)&&normDate(s.date).startsWith(mk));
}

// ══ MONTHS SELECT ══
function monthsOpts(past=6,future=0){
  const n=new Date(),y=n.getFullYear(),m=n.getMonth();
  const cur=y+'-'+String(m+1).padStart(2,'0');
  let html='';
  for(let i=future;i>=1;i--){
    const d=new Date(y,m+i,1);
    const mk=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    html+=`<option value="${mk}">${d.toLocaleDateString('ru-RU',{month:'long',year:'numeric'})}</option>`;
  }
  html+=`<option value="${cur}" selected>${n.toLocaleDateString('ru-RU',{month:'long',year:'numeric'})}</option>`;
  for(let i=1;i<past;i++){
    const d=new Date(y,m-i,1);
    const mk=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    html+=`<option value="${mk}">${d.toLocaleDateString('ru-RU',{month:'long',year:'numeric'})}</option>`;
  }
  return html;
}

// ══ INIT ══
async function init(){
  L(true);
  try{
    [USERS,PARAMS]=await Promise.all([api('getUsers'),api('getParams')]);
    const sel=document.getElementById('lname');
    sel.innerHTML='<option value="">— выберите —</option>';
    [...USERS].sort((a,b)=>a.name.localeCompare(b.name)).forEach(u=>{
      sel.innerHTML+=`<option value="${u.id}">${u.name}</option>`;
    });
  }catch(e){
    document.getElementById('loader').innerHTML=`<div style="text-align:center;color:var(--red)"><b>Ошибка подключения</b><br><small>${e.message}</small></div>`;
    return;
  }
  L(false);showScreen('login');
}

function showScreen(n){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+n).classList.add('active');
}

// ══ AUTH ══
window.doLogin=async function(){
  const id=document.getElementById('lname').value;
  const pass=document.getElementById('lpass').value;
  const err=document.getElementById('lerr');
  err.style.display='none';
  if(!id){err.textContent='Выберите имя';err.style.display='block';return}
  const user=USERS.find(u=>u.id===id&&String(u.pass)===String(pass));
  if(!user){err.textContent='Неверный пароль';err.style.display='block';return}
  document.getElementById('lpass').value='';
  CU=user;
  document.getElementById('sb-name').textContent=CU.name;
  document.getElementById('sb-shop').textContent=CU.shop||'Администратор';
  L(true);
  [_sales,_plans,PARAMS]=await Promise.all([api('getSales',{}),api('getPlans',{}),api('getParams')]);
  L(false);
  setupSidebar();showScreen('app');
}
window.doLogout=function(){CU=null;showScreen('login')}

function nav(fn){
  document.querySelectorAll('.ni').forEach(n=>n.classList.remove('active'));
  const el=document.getElementById('n-'+fn);if(el)el.classList.add('active');
}

function setupSidebar(){
  const items=CU.role==='seller'
    ?[{ic:'📊',l:'Дашборд',fn:'pgDash'},{ic:'➕',l:'Ввод продаж',fn:'pgEnter'},
      {ic:'📋',l:'История',fn:'pgHist'},{ic:'🏆',l:'Рейтинг',fn:'pgRating'}]
    :CU.role==='manager'
    ?[{ic:'📊',l:'Сводка',fn:'pgReport'},{ic:'💰',l:'Начисление ЗП',fn:'pgPayroll'},
      {ic:'👤',l:'Сотрудники',fn:'pgSellers'}]
    :[{ic:'📊',l:'Сводка',fn:'pgReport'},{ic:'💰',l:'Начисление ЗП',fn:'pgPayroll'},
      {ic:'👤',l:'Сотрудники',fn:'pgSellers'},{ic:'🎯',l:'Планы',fn:'pgPlans'},
      {ic:'⚙️',l:'Параметры',fn:'pgParams'}];
  document.getElementById('sb-nav').innerHTML=items.map(i=>
    `<button class="ni" id="n-${i.fn}" onclick="${i.fn}()"><span style="width:20px">${i.ic}</span>${i.l}</button>`
  ).join('');
  if(CU.role==='seller')pgDash();else pgReport();
}

// ══════════════════════════════════════
// ПРОДАВЕЦ — ДАШБОРД
// ══════════════════════════════════════
window.pgDash=async function(){
  nav('pgDash');setTitle('Мой дашборд');
  setContent('<div style="padding:2rem;text-align:center"><div class="spin"></div></div>');
  L(true);
  const mk=curMk();
  [_sales,_plans,PARAMS,window._shopStats]=await Promise.all([
    api('getSales',{uid:CU.id}),api('getPlans',{}),api('getParams'),
    api('getShopStats',{mk})
  ]);
  L(false);
  const plan=getPlan(CU.id,mk);
  const entries=getEntriesFor(CU.id,mk);
  let ts=0,tc=0,tu=0;entries.forEach(e=>{ts+=+e.sales;tc+=+e.checks;tu+=+e.units});
  const actualShifts=entries.length; // дней с продажами = фактические смены
  const pct=plan>0?ts/plan:0;
  // Shop plan bonus
  const shopStats=(window._shopStats||{})[CU.shop]||{fact:0,plan:0,pct:0};
  const shopPlanMet=shopStats.plan>0 && shopStats.fact>=shopStats.plan;
  const zp=calcZPActual(ts,tc,tu,pct,actualShifts,shopPlanMet);
  const normShifts=parseFloat(PARAMS.shifts)||15;
  setBadge(rankChip(pct));

  // Прогресс к целям с ЗП при каждом пороге
  let stages='';
  [{p:.8,lbl:'80% — Самурай',col:'#BA7517'},{p:1,lbl:'100% — Мастер',col:'#185FA5'},{p:1.4,lbl:'140% — Легенда',col:'#639922'}]
  .forEach(st=>{
    const need=Math.max(0,plan*st.p-ts);
    const bar=Math.min(100,plan>0?ts/(plan*st.p)*100:0);
    const scenSales=plan>0?plan*st.p:ts;
    const scenZP=calcZP(scenSales,tc,tu,st.p); // norm shifts for prognosis
    stages+=`<div style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px">
        <span style="color:${st.col};font-weight:600">${st.lbl}</span>
        <span style="color:var(--muted)">${need>0?'ещё '+fmt(need):'✓ Выполнено'}</span>
      </div>
      <div class="pb"><div class="pf" style="width:${bar}%;background:${st.col}"></div></div>
      <div style="font-size:12px;color:${st.col};margin-top:3px">ЗП при этом уровне: <b>${fmt(scenZP.total)}</b></div>
    </div>`;
  });

  // Расшифровка ЗП
  let zpHtml='';
  [['Оклад ('+actualShifts+' смен × '+fmt(parseFloat(PARAMS.rate)||6000)+')',zp.oklad],
   ['% от продаж',zp.base],['Доб.% 80%',zp.a80],['Доб.% 100%',zp.a100],
   ['Доб.% 140%',zp.a140],['Бонус план',zp.bMag],['Бонус KPI (ср.чек)',zp.bk1],
   ['Бонус KPI (UPT)',zp.bk2],['ИТОГО',zp.total]
  ].forEach(([l,v])=>zpHtml+=`<div class="zpr"><span>${l}</span><span>${fmt(v)}</span></div>`);

  // Нужно продавать — с учётом смен
  const now=new Date();
  const dLeft=daysInMk(mk)-now.getDate(); // календарных дней до конца месяца
  const shiftsLeft=Math.min(dLeft, normShifts-actualShifts); // смен осталось (минимум из двух)
  let daily='';
  if(plan>0){
    [{p:1,l:'100% плана'},{p:1.4,l:'140% плана'}].forEach(t=>{
      const need=Math.max(0,plan*t.p-ts);
      const perDay=shiftsLeft>0?need/shiftsLeft:0;
      daily+=`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px">
        <span>До ${t.l}</span><b>${need>0?fmt(perDay)+'/смену':'✓ Готово'}</b></div>`;
    });
    daily+=`<div style="font-size:11px;color:var(--muted);margin-top:6px">
      Отработано смен: ${actualShifts} из ${normShifts} | Осталось смен: ${Math.max(0,shiftsLeft)} (календарных дней: ${dLeft})
    </div>`;
  }else daily='<span style="color:var(--muted);font-size:13px">План не установлен</span>';

  // Сценарий ЗП — поле ввода %
  const avg=tc>0?ts/tc:0;const upt=tc>0?tu/tc:0;

  setContent(`
    <div class="motiv">${motiv(pct)}</div>
    <div class="g4" style="margin-bottom:1rem">
      <div class="metric"><div class="ml">Продажи</div><div class="mv" style="font-size:17px">${fmt(ts)}</div></div>
      <div class="metric"><div class="ml">Выполнение</div><div class="mv" style="color:${barCol(pct)}">${Math.round(pct*100)}%</div></div>
      <div class="metric"><div class="ml">ЗП сейчас</div><div class="mv" style="font-size:17px;color:var(--blue)">${fmt(zp.total)}</div></div>
      <div class="metric"><div class="ml">План месяца</div><div class="mv" style="font-size:17px">${plan>0?fmt(plan):'—'}</div></div>
    </div>
    ${shopStats.plan>0?`
    <div class="card" style="margin-bottom:1rem;border-left:3px solid #185FA5">
      <div style="font-size:13px;font-weight:600;color:var(--bd);margin-bottom:8px">📊 План магазина ${CU.shop}</div>
      <div style="display:flex;gap:2rem;flex-wrap:wrap;font-size:13px">
        <span>План: <b>${fmt(shopStats.plan)}</b></span>
        <span>Факт: <b>${fmt(shopStats.fact)}</b></span>
        <span>Выполнение: <b style="color:${barCol(shopStats.pct)}">${Math.round(shopStats.pct*100)}%</b></span>
        <span>${shopPlanMet?'<span class="tag ts">Бонус +'+fmt(parseFloat(PARAMS.bMag)||10000)+'</span>':'<span class="tag tw">Бонус не начислен</span>'}</span>
      </div>
      <div class="pb" style="margin-top:8px"><div class="pf" style="width:${Math.min(100,shopStats.pct*100)}%;background:#185FA5"></div></div>
    </div>`:''}
    <div class="g2">
      <div class="card" style="margin:0"><div class="ct">Прогресс к целям</div>${stages}</div>
      <div class="card" style="margin:0"><div class="ct">Расшифровка ЗП</div>${zpHtml}</div>
    </div>
    <div class="g2" style="margin-top:1rem">
      <div class="card" style="margin:0">
        <div class="ct">KPI</div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <div><div style="font-size:11px;color:var(--muted)">Средний чек</div>
            <div style="font-size:20px;font-weight:700">${fmt(avg)}</div>
            <div style="font-size:11px;color:var(--muted)">норма: ${fmt(parseFloat(PARAMS.avgNorm)||15000)}</div></div>
          <div>${avg>=(parseFloat(PARAMS.avgNorm)||15000)?`<span class="tag ts">+${fmt(parseFloat(PARAMS.bKpi)||10000)}</span>`:`<span class="tag tw">−${fmt((parseFloat(PARAMS.avgNorm)||15000)-avg)}</span>`}</div>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div><div style="font-size:11px;color:var(--muted)">UPT</div>
            <div style="font-size:20px;font-weight:700">${upt.toFixed(2)}</div>
            <div style="font-size:11px;color:var(--muted)">норма: ${Math.min(parseFloat(PARAMS.uptNorm)||2.5,100).toFixed(1)}</div></div>
          <div>${upt>=Math.min(parseFloat(PARAMS.uptNorm)||2.5,100)?`<span class="tag ts">+${fmt(parseFloat(PARAMS.bKpi)||10000)}</span>`:`<span class="tag tw">${upt.toFixed(2)} / ${Math.min(parseFloat(PARAMS.uptNorm)||2.5,100).toFixed(1)}</span>`}</div>
        </div>
      </div>
      <div class="card" style="margin:0">
        <div class="ct">Нужно в смену до конца месяца</div>
        ${daily}
        <hr style="margin:12px 0;border:none;border-top:1px solid var(--border)">
        <div class="ct" style="font-size:13px;margin-bottom:8px">Рассчитать ЗП по % выполнения</div>
        <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
          <input type="number" id="scen-pct" class="fc" style="width:100px" placeholder="%" value="100" min="0" max="999">
          <span style="color:var(--muted);font-size:13px">% от плана</span>
          <button class="btn bp bsm" onclick="calcScen()">Рассчитать</button>
        </div>
        <div id="scen-result" style="font-size:14px;font-weight:600;color:var(--blue)"></div>
      </div>
    </div>`);

  // Store for scen calc
  window._dashData={ts,tc,tu,plan,pct,actualShifts};
}

window.calcScen=function(){
  const pctVal=parseFloat(document.getElementById('scen-pct').value)||0;
  const p=pctVal/100;
  const d=window._dashData||{};
  const scenSales=d.plan>0?d.plan*p:d.ts;
  const z=calcZP(scenSales,d.tc||0,d.tu||0,p); // norm shifts for scenario
  document.getElementById('scen-result').textContent=`ЗП при ${Math.round(pctVal)}%: ${fmt(z.total)}`;
}

window.admDelRow=async function(uid,date,btn){
  if(!confirm(`Удалить ${date}?`))return;
  L(true);await apiPost('deleteSale',{uid,date});L(false);
  btn.closest('tr').remove();loadPayroll();
}

window.admSaveAll=async function(uid,btn){
  const inputs=btn.closest('.ovc').querySelectorAll('input[data-date]');
  const byDate={};
  inputs.forEach(inp=>{
    const d=inp.dataset.date;
    if(!byDate[d])byDate[d]={uid,date:d,sales:0,checks:0,units:0};
    byDate[d][inp.dataset.f]=parseFloat(inp.value)||0;
  });
  L(true);
  for(const data of Object.values(byDate))await apiPost('saveSale',data);
  L(false);
  const msg=btn.parentElement.querySelector('#emsg2');
  msg.textContent='✓ Сохранено';msg.style.color='var(--green)';
  setTimeout(()=>loadPayroll(),400);
}

        </div>
        <div class="fg"><label class="fl">Роль</label>

            <option value="seller">Продавец</option>
            ${CU.role==='admin'?'<option value="manager">Управляющий</option><option value="admin">Гл. Администратор</option>':''}

function renderSellers(){
  let users=CU.role==='admin'?USERS:USERS.filter(u=>u.shop===CU.shop);
  users=[...users].sort((a,b)=>a.name.localeCompare(b.name));
  const rm={admin:'Гл. Админ',manager:'Управляющий',seller:'Продавец'};
  document.getElementById('slist').innerHTML=`<div class="tw-wrap"><table>
    <tr><th>Имя</th><th>Магазин</th><th>Роль</th><th></th></tr>
    ${users.map(u=>{
      // manager can only edit/delete sellers from their shop
      const canEdit = CU.role==='admin' || (CU.role==='manager' && u.role==='seller' && u.shop===CU.shop);
      return `<tr>
        <td>${u.name}</td><td>${u.shop||'—'}</td><td>${rm[u.role]||u.role}</td>
        <td style="white-space:nowrap">
          ${canEdit?`<button class="btn bsm" onclick="openEditUser('${u.id}')">✏️</button>
          <button class="btn bsm bd2" onclick="removeSeller('${u.id}')">Удалить</button>`:''}
        </td>
      </tr>`;
    }).join('')}
  </table></div>`;
}

window.openEditUser=function(id){
  const u=USERS.find(x=>x.id===id);if(!u)return;
  const shops=CU.role==='manager'?[CU.shop]:SHOPS;
  const ov=document.createElement('div');ov.className='ov';
  ov.innerHTML=`<div class="ovc" style="max-width:400px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
      <b>Редактировать сотрудника</b>
      <button class="btn bsm" onclick="this.closest('.ov').remove()">✕</button>
    </div>
    <div class="fg"><label class="fl">ФИО</label><input type="text" id="eu-name" class="fc" value="${u.name}"></div>
    <div class="fr">
      <div class="fg"><label class="fl">Магазин</label>
        <select id="eu-shop" class="fc">${shops.map(s=>`<option ${s===u.shop?'selected':''}>${s}</option>`).join('')}</select>
      </div>
      <div class="fg"><label class="fl">Роль</label>
        <select id="eu-role" class="fc">

          ${CU.role==='admin'?`<option value="manager" ${u.role==='manager'?'selected':''}>Управляющий</option><option value="admin" ${u.role==='admin'?'selected':''}>Гл. Администратор</option>`:''}
        </select>

      <input type="text" id="eu-pass" class="fc" placeholder="новый пароль">

window.saveEditUser=async function(id){
  const u=USERS.find(x=>x.id===id);
  const name=document.getElementById('eu-name').value.trim();
  const shop=document.getElementById('eu-shop').value;
  const role=document.getElementById('eu-role').value;
  const pass=document.getElementById('eu-pass').value.trim();
  if(!name){alert('Введите имя');return}
  const newPass=pass||u.pass;
  L(true);
  await apiPost('updateUser',{id,name,shop,role,pass:newPass});
  USERS=await api('getUsers');
  // refresh login select
  const sel=document.getElementById('lname');
  if(sel){sel.innerHTML='<option value="">— выберите —</option>';
    [...USERS].sort((a,b)=>a.name.localeCompare(b.name)).forEach(u=>{sel.innerHTML+=`<option value="${u.id}">${u.name}</option>`});}
  L(false);
  document.querySelector('.ov').remove();
  renderSellers();
}

window.addSeller=async function(){
  const name=document.getElementById('nn').value.trim();
  const shop=document.getElementById('ns').value;
  const role=document.getElementById('nr').value;
  const pass=document.getElementById('np').value.trim();
  if(!name||!pass){alert('Заполните имя и пароль');return}
  L(true);
  await apiPost('addUser',{name,shop,role,pass});
  USERS=await api('getUsers');
  const sel=document.getElementById('lname');
  if(sel){sel.innerHTML='<option value="">— выберите —</option>';
    [...USERS].sort((a,b)=>a.name.localeCompare(b.name)).forEach(u=>{sel.innerHTML+=`<option value="${u.id}">${u.name}</option>`});}
  L(false);
  document.getElementById('nn').value='';document.getElementById('np').value='';
  const m=document.getElementById('addMsg');m.className='alert as';m.textContent='✓ Сотрудник добавлен';
  renderSellers();setTimeout(()=>m.textContent='',2000);
}

window.removeSeller=async function(id){
  if(!confirm('Удалить сотрудника?'))return;
  L(true);await apiPost('deleteUser',{id});USERS=await api('getUsers');L(false);
  renderSellers();
}

  </div>`);

function buildShopPlansTable(){
  const n=new Date(),y=n.getFullYear(),m=n.getMonth();
  const months=[];
  for(let i=-1;i<5;i++){const d=new Date(y,m+i,1);months.push(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'));}
  let html=`<table><tr><th>Магазин</th>${months.map(mk=>`<th>${mk}</th>`).join('')}</tr>`;
  SHOPS.forEach(shop=>{
    const uid='shop_'+shop;
    html+=`<tr><td>${shop}</td>`;
    months.forEach(mk=>{const p=getPlan(uid,mk);html+=`<td style="font-size:12px">${p?fmtN(p):'—'}</td>`;});
    html+='</tr>';
  });
  return html+'</table>';
}

function buildPlansTable(sellers){
  const n=new Date(),y=n.getFullYear(),m=n.getMonth();
  const months=[];
  for(let i=-1;i<5;i++){const d=new Date(y,m+i,1);months.push(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'));}
  let html=`<table><tr><th>Продавец</th>${months.map(mk=>`<th>${mk}</th>`).join('')}</tr>`;
  sellers.forEach(u=>{
    html+=`<tr><td>${u.name}</td>`;
    months.forEach(mk=>{const p=getPlan(u.id,mk);html+=`<td style="font-size:12px">${p?fmtN(p):'—'}</td>`;});
    html+='</tr>';
  });
  return html+'</table>';
}

window.savePlan=async function(){
  const uid=document.getElementById('psel').value;
  const mk=document.getElementById('pmk').value;
  const amt=parseFloat(document.getElementById('pamt').value)||0;
  L(true);await apiPost('savePlan',{uid,mk,amount:amt});_plans=await api('getPlans',{});L(false);
  const m=document.getElementById('pmsg');m.className='alert as';m.textContent='✓ План сохранён';
  document.getElementById('ptbl').innerHTML=buildPlansTable(USERS.filter(u=>u.role==='seller'));
  setTimeout(()=>m.textContent='',2000);
}

window.saveShopPlan=async function(){
  const shop=document.getElementById('shop-psel').value;
  const mk=document.getElementById('shop-pmk').value;
  const amt=parseFloat(document.getElementById('shop-pamt').value)||0;
  const uid='shop_'+shop; // special uid for shop plans
  L(true);await apiPost('savePlan',{uid,mk,amount:amt});_plans=await api('getPlans',{});L(false);
  const m=document.getElementById('shop-pmsg');m.className='alert as';m.textContent='✓ План магазина сохранён';
  const tbl=document.getElementById('shop-ptbl');if(tbl)tbl.innerHTML=buildShopPlansTable();
  setTimeout(()=>m.textContent='',2000);
}
